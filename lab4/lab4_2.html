<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Оформление вертикального меню</title>
    <style>
        html {
            background: #fff2e9;
        }

        .menu {
            width: 300px;
            background: #ffefc4;
        }

        .menu ul {
            list-style: none;
        }

        .menu li {
            list-style: none;
            position: relative;

        }

        .menu li a {
            color: rgb(70, 80, 40);
            padding: 20px;
            background: url('pic/minus.gif') no-repeat left;
        }

        .menu li ul {
            padding-bottom: 20px;
        }

        .menu li li a {
            background: url('pic/point.gif') no-repeat left;
        }
        
    </style>
</head>

<body>

            </li>

                    <li><a href="#">Джаз</a></li>

            </li>

</html>
